[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: Integration tests that require network access or live API credentials
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
# Per-test timeout (seconds) — prevents any single test from blocking the suite.
# Individual tests can override with @pytest.mark.timeout(120) when needed.
timeout = 60
# Skip integration tests by default
addopts = -v -m "not integration"
