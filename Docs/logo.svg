<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <linearGradient id="zGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b32ca8"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
    <linearGradient id="iyaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b3aaa"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Z logomark -->
  <text x="20" y="58" font-family="Georgia, 'Times New Roman', serif" font-weight="800" font-size="52" letter-spacing="-0.02em" fill="url(#zGrad)" filter="url(#glow)">&#x2124;</text>
  <!-- iya wordmark -->
  <text x="62" y="59" font-family="'Avenir Next', Avenir, Montserrat, 'Trebuchet MS', sans-serif" font-weight="700" font-size="46" letter-spacing="0.10em" fill="url(#iyaGrad)">iya</text>
</svg>
