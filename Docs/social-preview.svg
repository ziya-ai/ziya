<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18121b"/>
      <stop offset="100%" style="stop-color:#0d2220"/>
    </linearGradient>
    <linearGradient id="zGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b32ca8"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
    <linearGradient id="iyaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b3aaa"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a0a0a0"/>
      <stop offset="100%" style="stop-color:#d0d0d0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern for depth -->
  <g opacity="0.03" stroke="#2dd4bf" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Z logomark -->
  <text x="462" y="290" font-family="Georgia, 'Times New Roman', serif" font-weight="800" font-size="140" letter-spacing="-0.02em" fill="url(#zGrad)" filter="url(#glow)">&#x2124;</text>

  <!-- iya wordmark -->
  <text x="580" y="292" font-family="'Avenir Next', Avenir, Montserrat, 'Trebuchet MS', sans-serif" font-weight="700" font-size="124" letter-spacing="0.10em" fill="url(#iyaGrad)">iya</text>

  <!-- Tagline -->
  <text x="640" y="370" text-anchor="middle" font-family="'Avenir Next', Avenir, Montserrat, 'Trebuchet MS', sans-serif" font-weight="400" font-size="28" fill="url(#tagGrad)" filter="url(#subtleGlow)">AI Technical Workbench</text>

  <!-- Subtitle -->
  <text x="640" y="420" text-anchor="middle" font-family="'Avenir Next', Avenir, Montserrat, 'Trebuchet MS', sans-serif" font-weight="300" font-size="18" fill="#808080">Code &#183; Architecture &#183; Operations</text>

  <!-- Accent line -->
  <line x1="520" y1="390" x2="760" y2="390" stroke="url(#zGrad)" stroke-width="1" opacity="0.3"/>
</svg>
